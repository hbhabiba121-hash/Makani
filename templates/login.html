<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-[#0B0F1A] flex items-center justify-center h-screen">
    <div class="glass p-10 rounded-3xl w-full max-w-md border border-white/5">
        <h2 class="text-3xl font-bold mb-2">Connexion</h2>
        <p class="text-gray-400 mb-8">Accédez à votre gestion immobilière.</p>
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Email</label>
                <input type="email" name="email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-purple-500 transition">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Mot de passe</label>
                <input type="password" name="password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-purple-500 transition">
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-semibold transition shadow-lg shadow-purple-500/20">Se connecter</button>
        </form>
    </div>
</body>
</html>
