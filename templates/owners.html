{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-10">
    <h2 class="text-3xl font-bold">Gestion des Propriétaires</h2>
    <button onclick="toggleModal('modalOwner')" class="bg-purple-600 px-6 py-3 rounded-xl font-semibold">+ Nouveau Propriétaire</button>
</div>

<div class="glass rounded-[2rem] overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-white/5 text-gray-400 uppercase text-xs">
            <tr>
                <th class="p-6">Nom</th>
                <th class="p-6">Email</th>
                <th class="p-6">Nombre de Biens</th>
                <th class="p-6">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-white/5">
            {% for owner in owners %}
            <tr class="hover:bg-white/5 transition">
                <td class="p-6 font-semibold">{{ owner.name }}</td>
                <td class="p-6 text-gray-400">{{ owner.email }}</td>
                <td class="p-6">
                    <span class="bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full text-xs">
                        {{ owner.properties|length }} propriété(s)
                    </span>
                </td>
                <td class="p-6">
                    <button class="text-gray-500 hover:text-white">Modifier</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- MODAL : CRÉER PROPRIÉTAIRE -->
<div id="modalOwner" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="glass p-10 rounded-[2.5rem] w-full max-w-lg border border-white/10">
        <h3 class="text-2xl font-bold mb-6">Nouveau Compte Propriétaire</h3>
        <form action="/add_owner" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Nom complet" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl" required>
            <input type="email" name="email" placeholder="Adresse Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl" required>
            <input type="password" name="password" placeholder="Mot de passe temporaire" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl" required>
            <div class="flex gap-4 pt-4">
                <button type="button" onclick="toggleModal('modalOwner')" class="flex-1 py-4 text-gray-400">Annuler</button>
                <button type="submit" class="flex-1 py-4 bg-purple-600 rounded-xl font-bold">Créer le compte</button>
            </div>
        </form>
    </div>
</div>

<script>
function toggleModal(id) {
    document.getElementById(id).classList.toggle('hidden');
}
</script>
{% endblock %}
